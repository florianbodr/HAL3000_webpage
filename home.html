<!DOCTYPE html>
<html>
	<head>
		<title>HAL3000</title>
		<link rel="icon" href="https://hal3000.ddns.net/icons/hal3000.ico">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="description" content="Don't do it Dave">
		<style>
			body {
				background-color: #2f2d2d;
				margin: 0;
			}
			.icon-grid {
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 7.5vw;
			}
			.icon-row {
				display: flex;
				gap: 7.5vw;
				align-items: flex-end;
			}
			.icon-grid a {
				display: block;
			}
			div.contact {
				position: absolute;
				bottom: 10px;
				left: 10px;
			}
			table.contable td {
				text-align:center;
				vertical-align: bottom;
				padding:20px;
			}
			div.hidden {
				position: absolute;
				bottom: 10px;
				right: 5%;
				transform: translate(+10%, +10px);
			}
			table.maintable td {
				text-align:center;
				vertical-align: bottom;
				padding:40px;
			}
			.iconsize {
				width: 8vw;
				height: auto;
			}
			.contactsize {
				height: 3vw;
				width: auto;
			}

			@media (prefers-color-scheme: light) {
			body {
				background-color: #f6f8fa;
			}
			img {
				filter: invert(1);
			}
		}

		@media (max-width: 768px) {
				body {
					overflow-x: hidden;
				}
				.icon-grid {
					position: static;
					transform: none;
					display: grid;
					grid-template-columns: repeat(3, 1fr);
					gap: 23px 20px;
					padding: 40px 20px;
					box-sizing: border-box;
					width: 100%;
					min-height: calc(100vh - 80px);
					align-content: center;
					justify-items: center;
				}
				.icon-row {
					display: contents;
				}
				.iconsize {
					width: 20vw;
				}
				div.contact {
					position: static;
					text-align: center;
					padding-bottom: 10px;
				}
				.contactsize {
					height: 8vw;
				}
				table.contable td {
					padding: 10px;
				}
				div.hidden {
					position: static;
					text-align: center;
					padding-bottom: 10px;
				}
				div.hidden .iconsize {
					width: 20vw;
				}
				div.hidden table.maintable td {
					padding: 20px;
				}
			}
		</style>
	</head>
	<body>
		<div class="icon-grid">
			<div class="icon-row">
				<a href="https://hal3000.ddns.net/cv_FB_web.pdf"><img src="icons/cv_icon.svg" alt="My Resume" class="iconsize"></a>
				<a href="https://hal3000.ddns.net/publications.html"><img src="icons/list.svg" alt="Publications list" class="iconsize"></a>
				<a href="https://hal3000.ddns.net/movies"><img src="icons/movies.svg" alt="Movies" class="iconsize"></a>
				<a href="https://hal3000.ddns.net/shows"><img src="icons/shows.svg" alt="TV Shows" class="iconsize"></a>
				<a href="https://hal3000.ddns.net/subtitles"><img src="icons/subtitles.svg" alt="Subtitles" class="iconsize"></a>
			</div>
			<div class="icon-row">
				<a href="https://hal3000.ddns.net/addmusic"><img src="icons/music_transfer.svg" alt="Music Transfer" class="iconsize"></a>
				<a href="https://hal3000.ddns.net/music"><img src="icons/music.svg" alt="Music" class="iconsize"></a>
				<a href="https://hal3000.ddns.net/cloud"><img src="icons/cloud.svg" alt="Nextcloud" class="iconsize"></a>
				<a href="https://hal3000.ddns.net/media"><img src="icons/mediaserver.svg" alt="Media Server" class="iconsize"></a>
			</div>
		</div>
		<div class="contact">
			<table class="contable">
				<tbody>
					<tr>
						<td><a href="mailto:hal3000page@gmail.com?subject=Contact from website"><img src="icons/email.svg" alt="Contact Email" class="contactsize"></a></td>
						<td><a href="https://www.linkedin.com/in/florian-bodranghien/" target="_blank"><img src="icons/linkedin.svg" alt="LinkedIn" class="contactsize"></a></td>
					</tr>
				</tbody>
			</table>
		</div>
		<div class="hidden">
			<table class="maintable">
				<tbody>
					<tr>
						<td><a href="https://hal3000.ddns.net/deluge"><img src="icons/trans_ico.svg" alt="ico" class="iconsize"></a></td>
						<td><a href="https://hal3000.ddns.net/indexers"><img src="icons/trans_ico.svg" alt="ico" class="iconsize"></a></td>
					</tr>
				</tbody>
			</table>
		</div>
	</body>
</html>
